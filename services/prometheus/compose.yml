# services/prometheus/compose.yml
# 用途: 本地 Prometheus（D-03 自监控；SVC-03）+ pushgateway（D-36, Phase 06-01）
# 端口: 9090 (Prometheus) + 9091 (pushgateway), D-03c 固定

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ar-prometheus
    ports:
      - "${PORT_PROMETHEUS:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    restart: unless-stopped

  pushgateway:
    image: prom/pushgateway:v1.10.0
    container_name: ar-pushgateway
    ports:
      - "${PORT_PUSHGATEWAY:-9091}:9091"
    volumes:
      - pushgateway-data:/data
    command:
      - --persistence.file=/data/pushgateway.data
      - --persistence.interval=1m
    restart: unless-stopped

volumes:
  prometheus-data:
    name: ar-prometheus-data
  pushgateway-data:
    name: ar-pushgateway-data
