# services/prometheus/prometheus.yml
# 用途: Prometheus 自监控 scrape config (D-03d) + pushgateway 抓取 (D-36, Phase 06-01)
# 容器内: localhost:9090 是 Prometheus 自己, pushgateway:9091 是同 compose 的 pushgateway

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    # self-scrape: 容器内 localhost 指容器自己
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: prometheus-self

  - job_name: pushgateway
    # D-36: honor_labels=true 保留 push 时打的 server/job 标签
    honor_labels: true
    # Formal GRPO telemetry samples at 0.5s; scrape pushgateway at the same
    # cadence so Grafana can show real runtime movement instead of flat replay.
    scrape_interval: 500ms
    static_configs:
      - targets: ["pushgateway:9091"]
        labels:
          instance: pushgateway-local
