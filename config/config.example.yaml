# === 外网探针 (phase 6 启用) ===
network:
  enabled: true
  targets:
    - https://baidu.com
    - https://huggingface.co
    - https://github.com

# === 日志 (D-16) ===
log:
  level: INFO
  json: false
  dir: ~/.autoresearch/logs

# === wandb (phase 9 启用) ===
wandb:
  enabled: true
  project: autoresearch

# === Phase 14: formal Verl case defaults ===
# Non-secret defaults only. HF/GitHub tokens stay in env/keyring, not here.
verl_case:
  cache_root: /Users/Zhuanz/autoResearchData
  artifact_root: /Users/Zhuanz/autoResearchData/runs
  docker_image: quay.io/ascend/verl:verl-8.5.2-910b-ubuntu22.04-py3.11-qwen3-5
  model_id: Qwen/Qwen3.5-2B
  dataset_id: hiyouga/geometry3k
  local_asset_limit_gb: 5
  input_tokens: 1024
  output_tokens: [2048, 4096, 8192, 16384]
  ignore_eos: false
  inference_modes: [sync, async]
  # W&B project_name uses the training stack / code repo as the top-level
  # visual grouping; each matrix row gets a readable run name.
  wandb_project: verl
  github_owner: Kirrito-k423
  remote_workdir: /home/t00906153
  # Formal row runtime knobs. Phase 15 defaults to real GRPO training.
  # Set trainer_val_only: true only when intentionally reproducing the
  # Phase 14 validation-only matrix.
  case_mode: training
  trainer_val_only: false
  training_steps: 3
  single_card_start_batch_size: 1
  single_card_devices: [0]
  single_node_devices: [0, 1, 2, 3, 4, 5, 6, 7]
  tuning_train_batch_sizes: [1, 2, 4, 8]
  tuning_ppo_mini_batch_sizes: [1]
  tuning_ppo_micro_batch_sizes_per_gpu: [1]
  train_batch_size: 8
  val_batch_size: 1
  train_max_samples: 8
  val_max_samples: 2
  rollout_n: 1
  n_gpus_per_node: 8
  tensor_model_parallel_size: 2
  row_timeout_seconds: 7200
  # fsdp is the portable default for the official Verl image. Use fsdp2 or
  # veomni only after the staged Verl repo/image confirms backend support.
  execution_profile: fsdp
  # Set true for FSDP2 CPUOffloadPolicy when actor optimizer state must stay off NPU.
  fsdp2_offload_policy: null
  # Null keeps the adapter default. Set a small integer to cap vLLM rollout
  # concurrency during memory-fragmentation probes.
  rollout_max_num_seqs: null
  # Null keeps the adapter default true. Set false to test avoiding repeated
  # vLLM sleep/wake around rollout weight updates.
  rollout_free_cache_engine: null
  # Null lets the adapter choose compatibility defaults. For Qwen3.5/FSDP the
  # runner disables both by default to avoid 3D position_ids microbatch splits.
  use_remove_padding: null
  use_dynamic_bsz: null
  # Optional per-server image overrides for heterogeneous Ascend pools.
  docker_images_by_server:
    A3-AX-180: quay.io/ascend/verl:verl-8.5.2-a3-ubuntu22.04-py3.11-qwen3-5
  # Optional dependency checkouts for provenance / optional commit+push.
  # Missing paths become warnings, not hard failures.
  dependency_repo_paths:
    verl: /home/t00906153/verl
    vllm: /home/t00906153/vllm
    transformers: /home/t00906153/transformers
    mindspeed: /home/t00906153/MindSpeed
  # Runtime source overrides mounted into the container. Keep vllm out by
  # default so the image's vLLM and vLLM-Ascend versions stay compatible.
  dependency_source_mounts:
    - verl
    - transformers
    - mindspeed
    - veomni
