# config/config.example.yaml
# 用途: autoresearch 配置文件模板. 复制为 config/config.yaml 后修改.
# 真实 config/config.yaml 在 .gitignore 里, 不进 git.
#
# === 安全声明 (D-32) ===
# - bootstrap_password_secret: 可用 <keyring:NAME> 或 <env:VAR> 占位符
# - bmc.password: 走明文 (内网机器, 不加密)
# - host: 你手动管理, 宕机时改这里再跑 autoresearch

version: 1

# === 远端服务器清单 (D-03 Bootstrap-then-Key) ===
# Phase 7 (D-40) 加 conda_env 字段, 走 `conda run -n <env>` 跑 stack check
